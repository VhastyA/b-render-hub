<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>b_render1 Official Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #11141a;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background-color: #11141a;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .banner-container {
            width: 100%;
            height: 360px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            cursor: pointer;
            background-color: #11141a;
        }

        /* Pure cross-fading underlying layers */
        .banner-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center center;
            will-change: opacity;
            transform: translateZ(0);
        }

        #bannerBack {
            z-index: 1;
            opacity: 1;
        }

        #bannerFront {
            z-index: 2;
            opacity: 1;
            transition: opacity 1.5s ease-in-out;
        }

        #bannerFront.fade-out {
            opacity: 0;
        }

        /* Dark overlay coating to ensure text readability exactly like ElifRent */
        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(17, 20, 26, 0.4), rgba(17, 20, 26, 0.85));
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Dynamic Headline Layout */
        .headline-container {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            letter-spacing: -0.5px;
            color: #ffffff;
            max-width: 90%;
            margin-top: -20px;
        }

        .changing-text {
            color: #bfa87a; /* Clean gold accent matching buttons */
            display: inline-block;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 1;
            transform: translateY(0);
        }

        .changing-text.text-flip {
            opacity: 0;
            transform: translateY(5px);
        }

        .banner-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 20, 26, 0.75);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(219, 225, 232, 0.1);
            color: #ffffff;
            z-index: 4;
            pointer-events: none;
        }

        .content-body {
            position: relative;
            z-index: 5;
            width: calc(100% - 40px);
            margin: 280px auto 40px auto;
            background-color: #151922;
            padding: 65px 24px 45px 24px;
            box-sizing: border-box;
            text-align: center;
            pointer-events: none;
            border-radius: 30px; 
            border: 1px solid rgba(219, 225, 232, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .avatar-container {
            width: 105px;
            height: 105px;
            border-radius: 50%;
            background-color: #000000;
            position: absolute;
            top: -52.5px;
            left: calc(50% - 52.5px);
            border: 4px solid #151922;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 12px 35px rgba(0,0,0,0.5);
            pointer-events: auto;
            z-index: 6;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1, .subtitle {
            pointer-events: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0 0 4px 0;
            color: #ffffff;
        }

        .subtitle {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #94a3b8;
            margin: 0 0 35px 0;
            font-weight: 500;
            opacity: 0.8;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            pointer-events: auto;
        }

        .pill-btn {
            display: block;
            background-color: #1e232e; 
            color: #ffffff;
            border: 1.5px solid #7c715c; 
            border-radius: 14px;
            padding: 18px 24px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .pill-btn:hover {
            background-color: #2a303e; 
            color: #ffffff;
            border-color: #bfa87a; 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(191, 168, 122, 0.12); 
        }
        
        .pill-btn:active {
            transform: translateY(0);
        }

        /* Lightbox Modal */
        .image-viewer-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 20, 26, 0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(20px);
        }

        .modal-active {
            display: flex;
        }

        .modal-render-view {
            max-width: 100%;
            max-height: 72vh;
            border-radius: 12px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            object-fit: contain;
        }

        .modal-controls {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .modal-btn {
            background-color: #dbe1e8;
            color: #151922;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .modal-btn:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="banner-container" onclick="openViewer()">
            <div class="banner-hint">View Render</div>
            
            <!-- Shifting Background Image Layers -->
            <div class="banner-layer" id="bannerBack"></div>
            <div class="banner-layer" id="bannerFront"></div>
            
            <!-- Interactive Text Overlay Layer -->
            <div class="banner-overlay">
                <div class="headline-container">
                    Find & Visualize Your <br>
                    <span class="changing-text" id="dynamicPhrase">Perfect Renders</span>
                </div>
            </div>
        </div>

        <div class="content-body">
            <div class="avatar-container">
                <img src="/static/images/logo.jpg" alt="B Render Logo" class="avatar-img">
            </div>

            <h1>B-render</h1>
            <div class="subtitle">Architectural Visualization Studio</div>

            <div class="links-stack">
                {% for item in links %}
                    <a href="{{ item.url }}" target="_blank" class="pill-btn">
                        {{ item.name }}
                    </a>
                {% endfor %}
            </div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="imageViewer" class="image-viewer-modal" onclick="closeViewerOnOverlay(event)">
        <img src="" alt="Render Preview" class="modal-render-view" id="modalImg">
        <div class="modal-controls">
            <button class="modal-btn close-btn" onclick="closeViewer()">Close</button>
        </div>
    </div>

    <script>
        // --- PORTFOLIO IMAGES CORES ---
        const images = [
            '/static/images/Exterior.jpg',
            '/static/images/Exterior (2).jpg',
            '/static/images/Exterior_2.jpg',
            '/static/images/Interior.jpg',
            '/static/images/Interior (2).jpg',
            '/static/images/Interior (3).jpg',
            '/static/images/Interior (4).jpg',
            '/static/images/Interior (5).jpg',
            '/static/images/Interior (6).jpg',
            '/static/images/Interior (7).jpg'
        ];

        // --- DYNAMIC TEXT TEXTURES (Matching Portal Video style) ---
        const phrases = [
            "Perfect Renders",
            "Spaces Securely & Comfortably",
            "Designs Professionally"
        ];
        
        let currentIndex = 0;
        let textIndex = 0;
        const changeInterval = 6000; // Shifting intervals
        
        const bannerFront = document.getElementById('bannerFront');
        const bannerBack = document.getElementById('bannerBack');
        const dynamicPhrase = document.getElementById('dynamicPhrase');

        // Setup base layer properties
        if (bannerFront && bannerBack && images.length > 0) {
            bannerFront.style.backgroundImage = `url('${images[currentIndex]}')`;
            const nextIndex = (currentIndex + 1) % images.length;
            bannerBack.style.backgroundImage = `url('${images[nextIndex]}')`;
        }

        function startSlideshow() {
            setInterval(() => {
                // 1. ADVANCE BACKGROUND IMAGES
                const nextIndex = (currentIndex + 1) % images.length;
                bannerBack.style.backgroundImage = `url('${images[nextIndex]}')`;
                bannerFront.classList.add('fade-out');

                // 2. ADVANCE OVERLAY HEADLINE TEXT (Syncs smoothly midway)
                if (dynamicPhrase) {
                    dynamicPhrase.classList.add('text-flip');
                    setTimeout(() => {
                        textIndex = (textIndex + 1) % phrases.length;
                        dynamicPhrase.textContent = phrases[textIndex];
                        dynamicPhrase.classList.remove('text-flip');
                    }, 400);
                }

                // Clean tracking variables right after transition completes
                setTimeout(() => {
                    currentIndex = nextIndex;
                    bannerFront.style.backgroundImage = `url('${images[currentIndex]}')`;
                    bannerFront.classList.remove('fade-out');
                    
                    const upcomingIndex = (currentIndex + 1) % images.length;
                    bannerBack.style.backgroundImage = `url('${images[upcomingIndex]}')`;
                }, 1500); 

            }, changeInterval);
        }

        if (images.length > 1) {
            startSlideshow();
        }

        // --- LIGHTBOX CONTROLS ---
        function openViewer() {
            const modal = document.getElementById('imageViewer');
            const modalImg = document.getElementById('modalImg');
            if(modal && modalImg) {
                modalImg.src = images[currentIndex];
                modal.classList.add('modal-active');
            }
        }

        function closeViewer() {
            const modal = document.getElementById('imageViewer');
            if(modal) modal.classList.remove('modal-active');
        }

        function closeViewerOnOverlay(event) {
            if (event.target.id === 'imageViewer' || event.target.classList.contains('close-btn')) {
                closeViewer();
            }
        }
    </script>
</body>
</html>
