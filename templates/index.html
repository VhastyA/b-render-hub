<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>b_render1 Official Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #11141a;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background-color: #151922;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* 🌆 Shifted background position to reveal more of the bottom scene */
        .banner-container {
            width: 100%;
            height: 310px; /* Expanded slightly to give the scene more breathing room */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            cursor: pointer;
        }

        .top-banner {
            width: 100%;
            height: 100%;
            background-image: url('/static/images/banner.jpg');
            background-size: cover;
            background-position: center 20%; /* 🎯 Shifts image to show the lower section/lady */
            transition: opacity 0.2s ease;
        }

        .banner-container:hover .top-banner {
            opacity: 0.9;
        }

        .banner-hint {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(17, 20, 26, 0.75);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(219, 225, 232, 0.1);
            color: #ffffff;
            pointer-events: none;
        }

        /* 🎯 Layout alignment adjusted to match new banner dimensions */
        .content-body {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 240px 28px 60px 28px; /* Pushed content box down to line up with the 310px header */
            box-sizing: border-box;
            text-align: center;
            pointer-events: none;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #000000;
            margin: 0 auto 24px auto;
            border: 3px solid #151922;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
            pointer-events: auto;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1, .subtitle {
            pointer-events: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0 0 4px 0;
            color: #ffffff;
        }

        .subtitle {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #94a3b8;
            margin: 0 0 45px 0;
            font-weight: 500;
            opacity: 0.8;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            pointer-events: auto;
        }

        .pill-btn {
            display: block;
            background-color: rgba(219, 225, 232, 0.06);
            color: #dbe1e8;
            border: 1px solid rgba(219, 225, 232, 0.12);
            border-radius: 14px;
            padding: 18px 24px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .pill-btn:hover {
            background-color: #dbe1e8;
            color: #151922;
            border-color: #dbe1e8;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(219,225,232,0.25);
        }

        /* 🖼️ Lightbox Modal */
        .image-viewer-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 20, 26, 0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(20px);
        }

        .modal-active {
            display: flex;
        }

        .modal-render-view {
            max-width: 100%;
            max-height: 72vh;
            border-radius: 12px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            object-fit: contain;
        }

        .modal-controls {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .modal-btn {
            background-color: #dbe1e8;
            color: #151922;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .modal-btn:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="banner-container" onclick="openViewer()">
            <div class="top-banner"></div>
            <span class="banner-hint"></span>
        </div>

        <div class="content-body">
            <div class="avatar-container">
                <img src="/static/images/logo.jpg" alt="B Render Logo" class="avatar-img">
            </div>

            <h1>B RENDER</h1>
            <div class="subtitle">Architectural Designer & Creator</div>

            <div class="links-stack">
                {% for item in links %}
                    <a href="{{ item.url }}" target="_blank" class="pill-btn">
                        {{ item.name }}
                    </a>
                {% endfor %}
            </div>
        </div>
    </div>

    <div id="imageViewer" class="image-viewer-modal" onclick="closeViewerOnOverlay(event)">
        <img src="/static/images/banner.jpg" alt="Architectural Render Full View" class="modal-render-view">
        
        <div class="modal-controls">
            <button class="modal-btn close-btn" onclick="closeViewer()">Close</button>
            <a href="/static/images/banner.jpg" download="b_render1_render.jpg" class="modal-btn">Download HD</a>
        </div>
    </div>

    <script>
        const modal = document.getElementById('imageViewer');

        function openViewer() {
            modal.classList.add('modal-active');
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            modal.classList.remove('modal-active');
            document.body.style.overflow = '';
        }

        function closeViewerOnOverlay(event) {
            if (event.target === modal) {
                closeViewer();
            }
        }
    </script>

</body>
</html>
