<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>b_render1 Official Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #11141a;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background-color: #11141a;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Set up the banner container to manage two sliding layers */
        .banner-container {
            width: 100%;
            height: 340px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            cursor: pointer;
            overflow: hidden;
        }

        /* Both layers sit perfectly on top of each other */
        .top-banner, .next-banner {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-size: cover;
            background-position: center center; 
        }

        /* The top banner handles the sliding line reveal animation */
        .top-banner {
            z-index: 2;
            clip-path: inset(0 0 0 0);
            transition: clip-path 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* The layer underneath waits to become the visible background */
        .next-banner {
            z-index: 1;
        }

        .banner-container:hover {
            opacity: 0.95;
        }

        .banner-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 20, 26, 0.75);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(219, 225, 232, 0.1);
            color: #ffffff;
            pointer-events: none;
            z-index: 3;
        }

        .content-body {
            position: relative;
            z-index: 2;
            width: calc(100% - 40px);
            margin: 240px auto 40px auto;
            background-color: #151922;
            padding: 80px 24px 45px 24px;
            box-sizing: border-box;
            text-align: center;
            pointer-events: none;
            border-radius: 30px; 
            border: 1px solid rgba(219, 225, 232, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .avatar-container {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            background-color: #000000;
            position: absolute;
            top: -57.5px;
            left: calc(50% - 57.5px);
            border: 4px solid #151922;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 12px 35px rgba(0,0,0,0.5);
            pointer-events: auto;
            z-index: 5;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1, .subtitle {
            pointer-events: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0 0 4px 0;
            color: #ffffff;
        }

        .subtitle {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #94a3b8;
            margin: 0 0 35px 0;
            font-weight: 500;
            opacity: 0.8;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            pointer-events: auto;
        }

        .pill-btn {
            display: block;
            background-color: #1e232e; 
            color: #ffffff;
            border: 1.5px solid #7c715c; 
            border-radius: 14px;
            padding: 18px 24px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .pill-btn:hover {
            background-color: #2a303e; 
            color: #ffffff;
            border-color: #bfa87a; 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(191, 168, 122, 0.12); 
        }
        
        .pill-btn:active {
            transform: translateY(0);
        }

        /* Lightbox Modal */
        .image-viewer-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 20, 26, 0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(20px);
        }

        .modal-active {
            display: flex;
        }

        .modal-render-view {
            max-width: 100%;
            max-height: 72vh;
            border-radius: 12px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            object-fit: contain;
        }

        .modal-controls {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .modal-btn {
            background-color: #dbe1e8;
            color: #151922;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .modal-btn:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="banner-container" onclick="openViewer()">
           
            <!-- Two image elements working together for the clean linear reveal -->
            <div class="next-banner" id="nextBanner"></div>
            <div class="top-banner" id="slideshowBanner"></div>
        </div>

        <div class="content-body">
            <div class="avatar-container">
                <img src="/static/images/logo.jpg" alt="B Render Logo" class="avatar-img">
            </div>

            <h1>B-render</h1>
            <div class="subtitle">Architectural Visualization Studio</div>

            <div class="links-stack">
                {% for item in links %}
                    <a href="{{ item.url }}" target="_blank" class="pill-btn">
                        {{ item.name }}
                    </a>
                {% endfor %}
            </div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="imageViewer" class="image-viewer-modal" onclick="closeViewerOnOverlay(event)">
        <img src="" alt="Render Preview" class="modal-render-view" id="modalImg">
        <div class="modal-controls">
            <button class="modal-btn close-btn" onclick="closeViewer()">Close</button>
        </div>
    </div>

    <script>
        const images = [
            '/static/images/1.jpg',
            '/static/images/2.jpg',
            '/static/images/3.jpg',
            '/static/images/4.jpg',
            '/static/images/5.jpg',
            '/static/images/6.jpg',
            '/static/images/7.jpg',
            '/static/images/8.jpg',
            '/static/images/9.jpg'
        ];
        
        let currentIndex = 0;
        const changeInterval = 8000; // Remains slow and steady (8 seconds per image)
        const banner = document.getElementById('slideshowBanner');
        const nextBanner = document.getElementById('nextBanner');

        // Set layout initial state
        if (banner && nextBanner) {
            banner.style.backgroundImage = `url('${images[currentIndex]}')`;
            const nextIndex = (currentIndex + 1) % images.length;
            nextBanner.style.backgroundImage = `url('${images[nextIndex]}')`;
        }

        function startSlideshow() {
            setInterval(() => {
                // 1. Animate a straight vertical line moving from left to right across the top image
                banner.style.clipPath = 'inset(0 0 0 100%)';

                // 2. Once the slide reveal ends (1.2 seconds), prepare for the next clean transition
                setTimeout(() => {
                    // Current background becomes what was underneath
                    currentIndex = (currentIndex + 1) % images.length;
                    banner.style.backgroundImage = `url('${images[currentIndex]}')`;
                    
                    // Instantly snap the top-layer line boundaries back to full visibility 
                    banner.style.transition = 'none';
                    banner.style.clipPath = 'inset(0 0 0 0)';
                    
                    // Force layer rendering update before restoring line transit speeds
                    banner.offsetHeight; 
                    banner.style.transition = 'clip-path 1.2s cubic-bezier(0.25, 1, 0.5, 1)';

                    // Dynamically load the upcoming next image behind it
                    const nextIndex = (currentIndex + 1) % images.length;
                    nextBanner.style.backgroundImage = `url('${images[nextIndex]}')`;
                }, 1200);

            }, changeInterval);
        }

        if (images.length > 1) {
            startSlideshow();
        }

        // --- LIGHTBOX CONTROLS ---
        function openViewer() {
            const modal = document.getElementById('imageViewer');
            const modalImg = document.getElementById('modalImg');
            
            modalImg.src = images[currentIndex];
            modal.classList.add('modal-active');
        }

        function closeViewer() {
            document.getElementById('imageViewer').classList.remove('modal-active');
        }

        function closeViewerOnOverlay(event) {
            if (event.target.id === 'imageViewer' || event.target.classList.contains('close-btn')) {
                closeViewer();
            }
        }
    </script>
</body>
</html>
