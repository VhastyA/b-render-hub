<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>b_render1 Official Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #11141a;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background-color: #151922;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* 🌆 Modern full-bleed background banner layout */
        .top-banner {
            width: 100%;
            height: 280px;
            background-image: url('/static/images/banner.png');
            background-size: cover;
            background-position: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Sleek seamless gradient fading out the background image */
        .top-banner::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(21,25,34,0) 20%, rgba(21,25,34,1) 100%);
        }

        .content-body {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 190px 28px 60px 28px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 🎯 Sleek, borderless minimalist frame for your logo */
        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #000000;
            margin: 0 auto 24px auto;
            border: 2px solid rgba(219, 225, 232, 0.15);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0 0 4px 0;
            color: #ffffff;
        }

        .subtitle {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #94a3b8;
            margin: 0 0 45px 0;
            font-weight: 500;
            opacity: 0.8;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        /* ✨ Ultra sleek, modern interactive link button frames */
        .pill-btn {
            display: block;
            background-color: rgba(219, 225, 232, 0.06);
            color: #dbe1e8;
            border: 1px solid rgba(219, 225, 232, 0.12);
            border-radius: 14px; /* Premium softened corner style instead of standard round pills */
            padding: 18px 24px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Smooth geometric transition highlight */
        .pill-btn:hover {
            background-color: #dbe1e8;
            color: #151922;
            border-color: #dbe1e8;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(219,225,232,0.25);
        }
        
        .pill-btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="top-banner"></div>

        <div class="content-body">
            <div class="avatar-container">
                <img src="/static/images/logo.jpg" alt="B Render Logo" class="avatar-img">
            </div>

            <h1>b_render1</h1>
            <div class="subtitle">Architectural Visualizer & Creator</div>

            <div class="links-stack">
                {% for item in links %}
                    <a href="{{ item.url }}" target="_blank" class="pill-btn">
                        {{ item.name }}
                    </a>
                {% endfor %}
            </div>
        </div>
    </div>

</body>
</html>
